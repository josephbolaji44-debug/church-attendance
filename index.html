<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CSOC Oke Ayo Osu Model Parish | Member Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f8f9fc 0%, #eef2f7 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .church-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .church-header h1 {
            font-size: 1.8rem;
            color: #1e3c72;
        }
        .church-header h1 span {
            background: #ffd966;
            padding: 0 0.3rem;
            border-radius: 12px;
        }
        .church-header h2 {
            font-size: 1.2rem;
            color: #d97706;
            margin-top: 0.5rem;
        }
        .church-header p {
            color: #2c3e66;
            margin-top: 0.5rem;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3c72;
            border-left: 6px solid #f5b042;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e2f4b;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #f5b042;
            box-shadow: 0 0 0 3px rgba(245,176,66,0.2);
        }
        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:hover {
            background: #0f2b4f;
            transform: scale(0.98);
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background: #dff9e6;
            color: #146b3a;
            border-left: 5px solid #2ecc71;
        }
        .error {
            background: #ffe6e5;
            color: #b33;
            border-left: 5px solid #e74c3c;
        }
        .loading {
            background: #e8f0fe;
            color: #1e3c72;
            border-left: 5px solid #3498db;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5f6c84;
        }
        .bible-verse {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #6c7a89;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="church-header">
        <h1>⛪ <span>Cherubim & Seraphim Church</span></h1>
        <h2>Oke Ayo Osu Model Parish</h2>
        <p>Attendance & Member Registration System</p>
    </div>

    <div class="card">
        <div class="card-title">📋 Register Your Attendance</div>
        <form id="registerForm">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="firstName" required placeholder="Enter first name">
            </div>
            <div class="form-group">
                <label>Second Name *</label>
                <input type="text" id="secondName" required placeholder="Enter second name">
            </div>
            <div class="form-group">
                <label>Surname *</label>
                <input type="text" id="surname" required placeholder="Enter surname">
            </div>
            <div class="form-group">
                <label>Sex *</label>
                <select id="sex" required>
                    <option value="">-- Select Gender --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phone" required placeholder="e.g., 08012345678">
            </div>
            <button type="submit" id="submitBtn">✍️ Submit Registration</button>
        </form>
        <div id="messageDiv"></div>
        <div class="bible-verse">
            "I was glad when they said unto me, Let us go into the house of the LORD." - Psalm 122:1
        </div>
    </div>
    <footer>
        Your registration is recorded instantly. God bless you.
    </footer>
</div>

<script>
    // ============================================
    // YOUR GOOGLE APPS SCRIPT URL (ALREADY ADDED)
    // ============================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvfr55dPPx3crp2be--_Tgirr3T9xqqiAUeWNIGsCpjJlqBcJFLErO5-HMgY2DQP6i/exec";
    
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('messageDiv');

    function showMessage(msg, type) {
        messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
        setTimeout(() => {
            if (messageDiv.innerHTML.includes(msg)) {
                messageDiv.innerHTML = "";
            }
        }, 6000);
    }

    async function submitToGoogleSheets(formData) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });
            
            // With no-cors mode, we assume success if no error thrown
            return true;
        } catch (error) {
            console.error('Submission error:', error);
            return false;
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const firstName = document.getElementById('firstName').value.trim();
        const secondName = document.getElementById('secondName').value.trim();
        const surname = document.getElementById('surname').value.trim();
        const sex = document.getElementById('sex').value;
        const phone = document.getElementById('phone').value.trim();

        // Validation
        if (!firstName || !secondName || !surname || !sex || !phone) {
            showMessage('❌ Please fill in all fields', 'error');
            return;
        }

        if (phone.length < 8) {
            showMessage('❌ Please enter a valid phone number (at least 8 digits)', 'error');
            return;
        }

        // Disable button and show loading
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Submitting...';
        showMessage('Sending registration to church database...', 'loading');

        const formData = {
            firstName: firstName,
            secondName: secondName,
            surname: surname,
            sex: sex,
            phone: phone,
            timestamp: new Date().toISOString(),
            registeredAt: new Date().toLocaleString()
        };

        const success = await submitToGoogleSheets(formData);
        
        if (success) {
            showMessage('✅ Registration Successful! Your attendance has been recorded. God bless you abundantly!', 'success');
            form.reset();
        } else {
            showMessage('❌ Registration Failed. Please check your internet connection and try again.', 'error');
        }
        
        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.textContent = '✍️ Submit Registration';
    });
</script>
</body>
</html>
